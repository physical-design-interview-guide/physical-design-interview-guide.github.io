name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [content-update]

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo (theme + config)
        uses: actions/checkout@v4

      - name: Checkout private content repo into content/posts
        uses: actions/checkout@v4
        with:
          repository: physical-design-interview-guide/pd-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: content/posts

      - name: Remove git metadata from posts folder (prevents Hugo confusion)
        run: rm -rf content/posts/.git content/posts/.gitignore

      - name: Copy images from content repo to static folder
        run: |
          if [ -d "content/posts/images" ]; then
            mkdir -p static/images
            cp -r content/posts/images/. static/images/
            echo "Copied images from pd-content/images/ to static/images/"
          fi

      - name: Convert images to WebP and resize for web
        run: |
          sudo apt-get install -y webp imagemagick -q
          mkdir -p static/images
          for img in static/images/*.{jpg,jpeg,png,JPG,JPEG,PNG}; do
            [ -f "$img" ] || continue
            base="${img%.*}"
            webp_file="${base}.webp"
            if [ ! -f "$webp_file" ] || [ "$img" -nt "$webp_file" ]; then
              convert "$img" -resize "1200x1200>" -quality 82 "$webp_file"
              echo "Converted: $img → $webp_file"
            fi
          done

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Create IndexNow key file in public folder
        run: echo "${{ secrets.INDEXNOW_KEY }}" > public/${{ secrets.INDEXNOW_KEY }}.txt
        
      - name: debug check key
        run: ls public/*.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Submit URLs to IndexNow
        uses: bojieyang/indexnow-action@v2
        with:
          sitemap-location: 'https://physical-design-interview-guide.github.io/sitemap.xml'
          key: ${{ secrets.INDEXNOW_KEY }}
          key-location: 'https://physical-design-interview-guide.github.io/${{ secrets.INDEXNOW_KEY }}.txt'
          endpoint: api.indexnow.org
          limit: 200
          since: 1
          since-unit: day
          lastmod-required: false